<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9C8DFF"/>
      <stop offset="55%" stop-color="#6A50E6"/>
      <stop offset="100%" stop-color="#3B23B0"/>
    </linearGradient>
    <radialGradient id="gloss" cx="50%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FDEFE7"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#20124F" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- squircle base -->
  <rect x="100" y="100" width="824" height="824" rx="188" ry="188" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="188" ry="188" fill="url(#gloss)"/>

  <!-- usage meter -->
  <g filter="url(#soft)">
    <rect x="232" y="458" width="560" height="108" rx="54" ry="54" fill="#FFFFFF" fill-opacity="0.20"/>
    <rect x="232" y="458" width="392" height="108" rx="54" ry="54" fill="url(#fill)"/>
  </g>

  <!-- sparkle accent -->
  <polygon points="700,232 715.4,280.6 764,296 715.4,311.4 700,360 684.6,311.4 636,296 684.6,280.6"
           fill="#FFFFFF"/>
  <polygon points="616,352 620.9,367.1 636,372 620.9,376.9 616,392 611.1,376.9 596,372 611.1,367.1"
           fill="#FFFFFF" fill-opacity="0.85"/>
</svg>
